name: CI/CD

on:
  push:
    branches: [main, dev]
    tags:
      - 'v*'
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Code Quality (parallèle) ──────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  type-check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  # ── Security ──────────────────────────────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high

  # ── Tests ─────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # ── Conventional Commits check (toutes les PR) ────────────────────────
  conventional-commits:
    name: Conventional commits check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR title follows conventional commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            style
            refactor
            perf
            test
            ci
            build
            revert

  # ── Release automatique (merge sur main uniquement) ───────────────────
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: [lint, type-check, audit, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install semantic-release plugins
        run: npm install --save-dev semantic-release @semantic-release/git @semantic-release/github @semantic-release/npm @semantic-release/commit-analyzer @semantic-release/release-notes-generator

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GIT_AUTHOR_NAME: github-ci
          GIT_AUTHOR_EMAIL: ci@github.com
          GIT_COMMITTER_NAME: github-ci
          GIT_COMMITTER_EMAIL: ci@github.com
        run: npx semantic-release

  # ── Build APK (après release, main uniquement) ────────────────────────
  build:
    name: EAS Build (production)
    runs-on: ubuntu-latest
    needs: [release]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci

      - name: Build production APK
        id: eas_build
        run: eas build --platform android --profile production --non-interactive --clear-cache

      - name: Get APK URL
        id: apk_url
        continue-on-error: true
        run: |
          APK_URL=$(eas build:list --platform android --limit 1 --non-interactive --json 2>/dev/null | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));console.log(d[0]?.artifacts?.buildUrl??'')")
          echo "url=${APK_URL}" >> $GITHUB_OUTPUT

      - name: Notify Discord (success)
        if: steps.eas_build.outcome == 'success'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          APK_URL="${{ steps.apk_url.outputs.url }}"
          APK_FIELD=""
          if [ -n "$APK_URL" ]; then
            APK_FIELD=", { \"name\": \"APK\", \"value\": \"[Télécharger](${APK_URL})\", \"inline\": false }"
          fi
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ Build réussi — v${VERSION}\",
                \"description\": \"Le build production Android est terminé.\",
                \"color\": 3066993,
                \"fields\": [
                  { \"name\": \"Branche\", \"value\": \"\`main\`\", \"inline\": true },
                  { \"name\": \"Commit\", \"value\": \"\`${{ github.sha }}\`\", \"inline\": true }
                  ${APK_FIELD}
                ]
              }]
            }"

      - name: Notify Discord (failure)
        if: steps.eas_build.outcome == 'failure'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"❌ Build échoué — v${VERSION}\",
                \"description\": \"Le build production Android a échoué.\",
                \"color\": 15158332,
                \"fields\": [
                  { \"name\": \"Branche\", \"value\": \"\`main\`\", \"inline\": true },
                  { \"name\": \"Commit\", \"value\": \"\`${{ github.sha }}\`\", \"inline\": true }
                ]
              }]
            }"